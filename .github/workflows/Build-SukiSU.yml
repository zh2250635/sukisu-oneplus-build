name: Build OnePlus_SukiSU Ultra All
on:
  workflow_dispatch:
    inputs:
      CPU:
        type: choice
        description: "分支"
        required: true
        default: sm8750
        options:
          - sm7550
          - sm7675
          - sm8450
          - sm8475
          - sm8550
          - sm8650
          - sm8750
          - sm8850
      FEIL:
        type: choice
        description: "配置文件"
        required: true
        default: oneplus_ace5_pro
        options:
          - oneplus_nord_ce4_v
          - oneplus_ace_3v_v
          - oneplus_nord_4_v
          - oneplus_10_pro_v
          - oneplus_10t_v
          - oneplus_11r_v
          - oneplus_ace2_v
          - oneplus_ace_pro_v
          - oneplus_11_v
          - oneplus_12r_v
          - oneplus_ace2_pro_v
          - oneplus_ace3_v
          - oneplus_open_v
          - oneplus12_v
          - oneplus_13r
          - oneplus_ace3_pro_v
          - oneplus_ace5
          - oneplus_pad2_v
          - oneplus_13
          - oneplus_13t
          - oneplus_ace5_pro
          - oneplus_pad_2_pro
          - oneplus_pad_3
          - oneplus_15
          - GitHub有bug可能不显示最后一项,误使用此项
      CPUD:
        type: choice
        description: "处理器代号"
        required: true
        default: sun
        options:
          - crow
          - waipio
          - kalama
          - pineapple
          - sun
          - canoe
      ANDROID_VERSION:
        type: choice
        description: "内核安卓版本"
        required: true
        default: android15
        options:
          - android12
          - android13
          - android14
          - android15
          - android16
      KERNEL_VERSION:
       type: choice
       description: "内核版本"
       required: true
       default: "6.6"
       options:
         - "5.10"
         - "5.15"
         - "6.1"
         - "6.6"
         - "6.12"
      BUILD_METHOD:
        type: choice
        description: "编译方式"
        required: true
        default: gki
        options:
          - gki
          - perf
      SUSFS_CI:
        type: boolean
        description: "下载SUSFS模块是否使用CI构建？"
        required: true
        default: true
      VFS:
        type: boolean
        description: "是否启用手动钩子？"
        required: true
        default: true
      KPM:
        type: boolean
        description: "是否启用KPM？"
        required: true
        default: true
      ZRAM:
        type: boolean
        description: "是否启用添加更多的ZRAM算法？"
        required: true
        default: false

      # ============== 组件版本锁定 ==============
      # 默认值锚定到「最近一次确认能编译并启动 OK」的 commit。
      # 上游有 breaking change（典型例子：SukiSU 5/21 #892 引入 multi-policy
      # SELinux extern 导致 selinuxfs.c 链接失败）时，这里默认值不变即可继续编译。
      # 等上游修了再统一上调。
      SUKISU_COMMIT:
        type: string
        description: "SukiSU-Ultra commit (锁版本，留空=builtin HEAD)"
        required: false
        default: "678c00cad91b8c9e8a2d8d3ffe71d919812d2d10"
      SUKISU_BRANCH:
        type: string
        description: "SukiSU-Ultra 分支名(setup.sh 用，决定 KSU_VERSION 计数基准)"
        required: false
        default: "builtin"
      # 默认值全部锚定到 release 40069（2025-11-08）发布当时的快照：
      #   - susfs4ksu  f450ec00 (2025-10-23): 与 SukiSU 678c00ca 接口匹配
      #     （新版 0269bced / f9c3df09 把 susfs_add_sus_path 等签名从
      #      `int f(struct st_susfs_sus_path __user*)` 改成
      #      `void f(void __user **)`，与 678c00ca 的 core_hook.c 调用不兼容）
      #   - SukiSU_patch 1ee91c8e (2025-11-08 12:00): release 40069 当天最新
      #   - AnyKernel3   80e0cc9e (2025-11-07): release 40069 前一天
      SUSFS4KSU_COMMIT:
        type: string
        description: "simonpunk/susfs4ksu commit (留空=对应分支 HEAD)"
        required: false
        default: "f450ec00bf592d080f59b01ff6f9242456c9a427"
      SUKISU_PATCH_COMMIT:
        type: string
        description: "ShirkNeko/SukiSU_patch commit (留空=main HEAD)"
        required: false
        default: "1ee91c8ec88fe3e88ea64fd5d805e0e2e072846d"
      ANYKERNEL3_COMMIT:
        type: string
        description: "Numbersf/AnyKernel3 commit (留空=master HEAD)"
        required: false
        default: "80e0cc9e736572ad16c7dc539ba9b6e40749f8e7"

jobs:
  build:
    # 跑在挂在 WSL 上的 self-hosted runner（label wsl-32c, 32 vCPU），代理已通过 ~/actions-runner/.env 注入
    runs-on: [self-hosted, linux, x64, wsl, kernel-builder]

    steps:
      # WSL 已挂 1 TB 磁盘且剩余 744 GB，无需 GitHub-hosted 的 maximize-build-space

      # self-hosted runner 不会自动清理工作区，每次开工先把旧产物清光，
      # 不再做持久化缓存（symlink/stash 那套被证明比全新拉还慢）。
      - name: Clean workspace from previous runs
        run: |
          set -x
          rm -rf "$GITHUB_WORKSPACE"/AnyKernel3
          rm -f  "$GITHUB_WORKSPACE"/*.zip
          rm -rf "$GITHUB_WORKSPACE"/susfs4ksu "$GITHUB_WORKSPACE"/SukiSU_patch || true
          # kernel_workspace 可能是上次的 symlink 也可能是实体目录，统统干掉
          KW="$GITHUB_WORKSPACE/kernel_workspace"
          if [ -L "$KW" ]; then
            rm -f "$KW"
          elif [ -d "$KW" ]; then
            rm -rf "$KW"
          fi
          ls -la "$GITHUB_WORKSPACE/"

      # 必须显式 checkout，原作者的 workflow 没这一步是因为 GitHub-hosted runner 默认会拉，
      # 但 self-hosted runner 不会自动 checkout，导致 patches/ 等本仓库文件取不到。
      - name: Checkout repo (for patches/ and any local files)
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "Numbersf"
          git config --global user.email "263623064@qq.com"

      - name: Install dependencies
        run: |
          # WSL 上已装好绝大部分依赖，缺啥补啥；用 DEBIAN_FRONTEND 跳过交互。
          # WSL 后台可能有 apt.systemd.daily 占着 apt 锁，用 flock 等到拿到锁再跑，
          # 避免 "Could not get lock /var/lib/apt/lists/lock" 错误。
          # 最长等 5 分钟，超时直接放弃（这一步本来就只是补缺，不是非装不可）。
          run_apt() {
            sudo DEBIAN_FRONTEND=noninteractive flock --wait 300 /var/lib/apt/lists/lock \
              flock --wait 300 /var/lib/dpkg/lock-frontend "$@"
          }
          run_apt apt-get update -qq || echo "apt-get update 失败/超时，继续"
          run_apt apt-get install -y -qq \
            python3 git curl wget jq bc bison flex zip unzip rsync xz-utils \
            build-essential libssl-dev libelf-dev cpio kmod ca-certificates \
            libncurses-dev dos2unix || {
            echo "::warning::apt-get install 失败，假定依赖已就绪继续"
          }

      - name: Show selected inputs debug
        run: |
          echo "Selected CPU: ${{ github.event.inputs.CPU }}"
          echo "Selected FEIL: ${{ github.event.inputs.FEIL }}"
          echo "Selected CPUD: ${{ github.event.inputs.CPUD }}"
          echo "Selected ANDROID_VERSION: ${{ github.event.inputs.ANDROID_VERSION }}"
          echo "Selected KERNEL_VERSION: ${{ github.event.inputs.KERNEL_VERSION }}"
          echo "Selected BUILD_METHOD: ${{ github.event.inputs.BUILD_METHOD }}"
          echo "Selected SUSFS_CI: ${{ github.event.inputs.SUSFS_CI }}"
          echo "Selected ZRAM: ${{ github.event.inputs.ZRAM }}"
          echo "Selected VFS: ${{ github.event.inputs.VFS }}"
          echo "Selected KPM: ${{ github.event.inputs.KPM }}"

      - name: Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
          # 不做缓存。每次都全新 repo init + sync，简单可靠。
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b refs/heads/oneplus/${{ github.event.inputs.CPU }} -m ${{ github.event.inputs.FEIL }}.xml --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

          # ====== 原 workflow 的清理动作 ======
          if [ -e kernel_platform/common/BUILD.bazel ]; then
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' kernel_platform/common/BUILD.bazel
          fi
          if [ -e kernel_platform/msm-kernel/BUILD.bazel ]; then
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' kernel_platform/msm-kernel/BUILD.bazel
          fi
          rm -f kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"
          rm -f kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports!"

      # 删除 -dirty 后缀
      - name: Force remove -dirty suffix
        run: |
          cd kernel_workspace/kernel_platform
          sed -i 's/ -dirty//g' common/scripts/setlocalversion
          sed -i 's/ -dirty//g' msm-kernel/scripts/setlocalversion
          sed -i 's/ -dirty//g' external/dtc/scripts/setlocalversion
          sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' common/scripts/setlocalversion
          git add -A
          git commit -m "Force remove -dirty suffix from kernel version"

      # 添加 SukiSU Ultra
      # 锁版本策略：SukiSU 的 setup.sh 内部就是 git clone + git checkout $1，
      # 所以直接把锁定 commit 传进去即可。这样既保留 setup.sh 的配置注入逻辑
      # （Makefile / Kconfig / symlink），又确保实际编译的源码是固定 commit，
      # 不受上游 builtin 分支后续改动影响。
      #
      # 上游有 breaking change 的典型例子：SukiSU 5/21 commit a1f0f754 (#892)
      # 引入 multi-policy SELinux extern (backup_sepolicy /
      # security_context_to_sid_with_policy 等)，导致 selinuxfs.c 链接 undefined
      # symbol。通过锁到 5/21 之前的 commit 即可避开。
      - name: Add KernelSU-SukiSU Ultra
        run: |
          set -euo pipefail
          cd kernel_workspace/kernel_platform

          PIN="${{ github.event.inputs.SUKISU_COMMIT }}"
          BRANCH="${{ github.event.inputs.SUKISU_BRANCH }}"
          BRANCH="${BRANCH:-builtin}"
          # 优先 commit，留空则用分支名
          REF="${PIN:-$BRANCH}"

          echo "=== SukiSU Ultra 装入 ==="
          echo "checkout 目标: $REF (PIN=${PIN:-空} BRANCH=$BRANCH)"

          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$REF"

          cd ./KernelSU
          # KSU_VERSION：用 main 分支 commit 计数 + 10606，跟 release 40069 对齐
          # （锁了 commit 后 HEAD 已经在指定 commit，需要从 origin/main 取计数）
          git fetch origin main --depth=200 || true
          KSU_VERSION=$(expr "$(git rev-list --count origin/main 2>/dev/null || git rev-list --count HEAD)" "+" 10606)
          echo "KSUVER=$KSU_VERSION" >> "$GITHUB_ENV"
          export KSU_VERSION
          sed -i "s/DKSU_VERSION=12800/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile
          echo "最终 KSUVER=$KSU_VERSION (HEAD: $(git rev-parse --short HEAD))"

      - name: Apply Patches SukiSU Ultra
        run: |
          set -euo pipefail
          cd kernel_workspace

          # ---- susfs4ksu (gitlab) ----
          # 用 -b 拉对应分支，再可选 checkout 到锁定 commit（如果传了 SUSFS4KSU_COMMIT）。
          SUSFS_BRANCH="gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}"
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"
          SUSFS_PIN="${{ github.event.inputs.SUSFS4KSU_COMMIT }}"
          if [ -n "$SUSFS_PIN" ]; then
            echo "锁定 susfs4ksu 到 $SUSFS_PIN"
            (cd susfs4ksu && git fetch --depth=200 origin "$SUSFS_BRANCH" && git checkout "$SUSFS_PIN")
          fi
          echo "susfs4ksu HEAD: $(cd susfs4ksu && git rev-parse --short HEAD)"

          # ---- ShirkNeko/SukiSU_patch (github) ----
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          PATCH_PIN="${{ github.event.inputs.SUKISU_PATCH_COMMIT }}"
          if [ -n "$PATCH_PIN" ]; then
            echo "锁定 SukiSU_patch 到 $PATCH_PIN"
            (cd SukiSU_patch && git checkout "$PATCH_PIN")
          fi
          echo "SukiSU_patch HEAD: $(cd SukiSU_patch && git rev-parse --short HEAD)"

          cd kernel_platform
          echo "正在给内核打susfs补丁"
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch ./common/
          cp ../susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/

          if [ "${{ github.event.inputs.ZRAM }}" = "true" ]; then
          echo "正在给内核打zram补丁"
          cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./common/include/linux
          cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./common/lib
          cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./common/crypto
          cp -r ../SukiSU_patch/other/zram/lz4k_oplus ./common/lib/
          fi

          cd ./common
          patch -p1 < 50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch || true
          echo "完成"

      - name: Apply Hide Stuff Patches
        run: |
          cd kernel_workspace/kernel_platform/common
          cp ../../SukiSU_patch/69_hide_stuff.patch ./
          echo "正在打隐藏应用补丁"
          patch -p1 -F 3 < 69_hide_stuff.patch

      - name: Apply LZ4KD
        run: |
          cd kernel_workspace/kernel_platform/common
          if [ "${{ github.event.inputs.ZRAM }}" = "true" ]; then
            cp ../../SukiSU_patch/other/zram/zram_patch/${{ github.event.inputs.KERNEL_VERSION }}/lz4kd.patch ./
            echo "正在打lz4kd补丁"
            patch -p1 -F 3 < lz4kd.patch || true
            echo '完成LZ4KD补丁'
          fi

      # OGKI -> GKI 转换（OnePlus Ace5 Pro 等 sm8750/HMBIRD_OGKI 机型必须！）
      # 不打这个 patch，内核会跑 OGKI 调度模式但 vendor userspace 期望 HMBIRD_GKI，
      # 导致 init 拉起 vendor 服务时找不到 ko，反复 bootloop。
      # patch 内容: 注入 drivers/hmbird_patch.c，在 early_initcall 阶段把
      # /soc/oplus,hmbird/version_type/type 从 "HMBIRD_OGKI" 改写成 "HMBIRD_GKI"。
      # 来自 Numbersf/Action-Build SukiSU-Ultra 分支 patches/hmbird_patch.patch。
      - name: Apply Convert HMBIRD_OGKI to HMBIRD_GKI
        if: ${{ github.event.inputs.KERNEL_VERSION == '6.6' || github.event.inputs.KERNEL_VERSION == '6.12' }}
        run: |
          set -euo pipefail
          PATCH_FILE="$GITHUB_WORKSPACE/patches/hmbird_patch.patch"
          if [ ! -f "$PATCH_FILE" ]; then
            echo "::error::找不到 $PATCH_FILE，需要从仓库 patches/ 目录提供"
            exit 1
          fi
          cd kernel_workspace/kernel_platform/common
          # 如果源码本来就有 hmbird 目录（部分新机型已经走 GKI），就不用打
          for p in ./kernel/sched/hmbird* ./vendor/oplus/kernel/cpu/sched_ext/hmbird*; do
            [ -d "$p" ] && {
              echo "源码中风驰代码已经存在，跳过 OGKI->GKI 转换"
              exit 0
            }
          done
          # drivers/Makefile 头部加 obj-y += hmbird_patch.o，让 hmbird_patch.c 编进 vmlinux
          if ! grep -q '^obj-y += hmbird_patch.o' drivers/Makefile; then
            sed -i '1iobj-y += hmbird_patch.o' drivers/Makefile
          fi
          echo "正在打 OGKI->GKI 转换补丁"
          patch -p1 -F 3 < "$PATCH_FILE"
          echo "OGKI->GKI 转换完成"

      # OnePlus 内核基带保护（Baseband Guard / BBG）
      # 参考 Image release 40069 中 strings 反推确认启用。
      # 通过 vc-teahouse/Baseband-guard setup.sh 把 BBG LSM 注入内核源码，
      # 然后改 security/Kconfig 的 LSM 默认列表把 baseband_guard 串接到 selinux 后面。
      - name: Apply LSM_BBG
        run: |
          set -euo pipefail
          cd kernel_workspace/kernel_platform/common
          echo "正在启用内核级基带保护支持..."
          curl -LSs https://raw.githubusercontent.com/vc-teahouse/Baseband-guard/main/setup.sh | bash
          # 把 baseband_guard 串到 LSM=... 默认列表里 selinux 后面（仅当还没串的时候）
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' ./security/Kconfig

      # 配置信息
      - name: Add Configuration Settings
        run: |
          cd kernel_workspace/kernel_platform
          CONFIG_FILE=./common/arch/arm64/configs/gki_defconfig
          KERNEL_VERSION="${{ github.event.inputs.KERNEL_VERSION }}"

          # SukiSU Ultra config
          echo "CONFIG_KSU=y" >> "$CONFIG_FILE"
          echo "CONFIG_KPM=y" >> "$CONFIG_FILE"

          # SUSFS config
          # 这一段对齐 release 40069 参考 Image 的实际启用项（strings 反推）：
          #   - 不启用 HAS_MAGIC_MOUNT（参考 Image 没有）
          #   - 显式关 SUS_SU=n（默认 y，但会触发 fs/devpts/inode.c 调用
          #     `ksu_handle_devpts`，而 SukiSU 678c00ca 只提供 `__ksu_handle_devpts`，
          #     最终 link 报 undefined symbol: ksu_handle_devpts）
          #   - 加 SUS_MAP=y（参考 Image 启用，新版 SukiSU 默认 y 但保险起见显式写）
          echo "CONFIG_KSU_SUSFS=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=n" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$CONFIG_FILE"

          # Remove check_defconfig
          sed -i 's/check_defconfig//' ./common/build.config.gki

          # LZ4KD配置
          if [ "${{ github.event.inputs.ZRAM }}" = "true" ]; then
          CONFIG_FILE=./common/arch/arm64/configs/gki_defconfig

            if [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.10" ]; then
              echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
              echo "CONFIG_ZRAM=y" >> "$CONFIG_FILE"
              echo "CONFIG_MODULE_SIG=n" >> "$CONFIG_FILE"
              echo "CONFIG_CRYPTO_LZO=y" >> "$CONFIG_FILE"
              echo "CONFIG_ZRAM_DEF_COMP_LZ4KD=y" >> "$CONFIG_FILE"
            fi

            if [ "${{ github.event.inputs.KERNEL_VERSION }}" != "6.6" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" != "6.12" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" != "5.10" ]; then
              if grep -q "CONFIG_ZSMALLOC" -- "$CONFIG_FILE"; then
                sed -i 's/CONFIG_ZSMALLOC=m/CONFIG_ZSMALLOC=y/g' "$CONFIG_FILE"
              else
                echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
              fi
              sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$CONFIG_FILE"
            fi

            if [ "${{ github.event.inputs.KERNEL_VERSION }}" = "6.6" ] || [ "${{ github.event.inputs.KERNEL_VERSION }}" = "6.12" ]; then
              echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
              sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$CONFIG_FILE"
            fi

            if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android14" ] || [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android15" ] || [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android16" ]; then
              if [  -e ./common/modules.bzl ]; then
                sed -i 's/"drivers\/block\/zram\/zram\.ko",//g; s/"mm\/zsmalloc\.ko",//g' "./common/modules.bzl"
              fi

              if [  -e ./msm-kernel/modules.bzl ]; then
                sed -i 's/"drivers\/block\/zram\/zram\.ko",//g; s/"mm\/zsmalloc\.ko",//g' "./msm-kernel/modules.bzl"
                echo "CONFIG_ZSMALLOC=y" >> "msm-kernel/arch/arm64/configs/${{ github.event.inputs.CPUD }}-GKI.config"
                echo "CONFIG_ZRAM=y" >> "msm-kernel/arch/arm64/configs/${{ github.event.inputs.CPUD }}-GKI.config"
              fi
              
              echo "CONFIG_MODULE_SIG_FORCE=n" >> "$CONFIG_FILE"
            elif [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.10" ] || [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.15" ]; then
              rm "common/android/gki_aarch64_modules"
              touch "common/android/gki_aarch64_modules"
            fi

            if grep -q "CONFIG_ZSMALLOC=y" "$CONFIG_FILE" && grep -q "CONFIG_ZRAM=y" "$CONFIG_FILE"; then
              echo "CONFIG_CRYPTO_LZ4HC=y" >> "$CONFIG_FILE"
              echo "CONFIG_CRYPTO_LZ4K=y" >> "$CONFIG_FILE"
              echo "CONFIG_CRYPTO_LZ4KD=y" >> "$CONFIG_FILE"
              echo "CONFIG_CRYPTO_842=y" >> "$CONFIG_FILE"
              echo "CONFIG_ZRAM_WRITEBACK=y" >> "$CONFIG_FILE"
            fi
          fi

      # 编译入口（FAST 路径，模仿 Numbersf/Action-Build SukiSU-Ultra workflow）
      # 直接 standalone GKI build：make O=out gki_defconfig olddefconfig all
      # 优点：
      #   1. 完全绕开 build_with_bazel.py，避免 OnePlus oplus_modules_variant.bzl
      #      `bazel_support_target=["sun","parrot"]` 引发的 ddk_config 重复定义问题
      #      （这也是之前 0003-oplus-bzl-only-build-sun-target.patch 修的事，
      #      改走 FAST 路径后就不再需要那个 patch）
      #   2. 不依赖 oplus_build_kernel.sh / build_with_bazel.py 的 OEM 包装
      #   3. release 40069 用的就是这条路径（FAST_BUILD=true），跟参考实现对齐
      # 关键路径：
      #   - clang prebuilt 来自 manifest 里 sync 下来的 prebuilts/clang/host/linux-x86/
      #     目录中的 clang-r{VERSION}/bin（VERSION 由 build.config.constants 给出）
      #   - PAHOLE 来自 prebuilts/kernel-build-tools/linux-x86/bin/pahole
      #   - KCFLAGS 加 -fdebug/file/macro-prefix-map 把绝对路径压缩成 . 便于 ccache 命中
      - name: Build kernel
        run: |
          set -euo pipefail
          cd kernel_workspace/kernel_platform

          # ---- 自动探测 prebuilts 目录名（部分仓库叫 prebuilts，部分带后缀） ----
          CLANG_PARENT=$(find . -maxdepth 1 -type d -name 'prebuilts*' -exec test -d '{}/clang/host/linux-x86' \; -print | head -1)
          KBT_PARENT=$(find . -maxdepth 1 -type d -name 'prebuilts*' -exec test -d '{}/kernel-build-tools' \; -print | head -1)
          if [ -z "$CLANG_PARENT" ]; then
            echo "::error::找不到 prebuilts*/clang/host/linux-x86"
            exit 13
          fi
          CLANG_PARENT="${CLANG_PARENT#./}"
          KBT_PARENT="${KBT_PARENT#./}"
          echo "✅ CLANG_PARENT=$CLANG_PARENT"
          echo "✅ KBT_PARENT=$KBT_PARENT"

          # ---- 提取 CLANG_VERSION（优先 build.config.common，回退 build.config.constants） ----
          CLANG_VERSION=""
          for f in ./common/build.config.common ./common/build.config.constants; do
            [ -f "$f" ] || continue
            v=$(grep -E '^(CLANG_VERSION|CLANG_PREBUILT_BIN)=' "$f" | head -1 || true)
            # 形如 CLANG_VERSION=r510928 或 CLANG_PREBUILT_BIN=...clang-r510928/bin
            if [[ "$v" =~ clang-(r[0-9a-z]+) ]]; then
              CLANG_VERSION="${BASH_REMATCH[1]}"
              break
            fi
            if [[ "$v" =~ ^CLANG_VERSION=(r[0-9a-z]+) ]]; then
              CLANG_VERSION="${BASH_REMATCH[1]}"
              break
            fi
          done
          if [ -z "$CLANG_VERSION" ]; then
            # 兜底：列目录看有几个 clang-r*，挑第一个
            CLANG_VERSION=$(ls -1 "$CLANG_PARENT/clang/host/linux-x86" 2>/dev/null | grep -E '^clang-r[0-9a-z]+$' | head -1 | sed 's/^clang-//')
          fi
          if [ -z "$CLANG_VERSION" ]; then
            echo "::error::无法识别 CLANG_VERSION"
            exit 13
          fi
          echo "✅ CLANG_VERSION=$CLANG_VERSION"

          CLANG_BIN="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$CLANG_PARENT/clang/host/linux-x86/clang-$CLANG_VERSION/bin"
          PAHOLE_BIN="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$KBT_PARENT/kernel-build-tools/linux-x86/bin/pahole"

          if [ ! -x "$CLANG_BIN/clang" ]; then
            echo "::error::clang 不存在: $CLANG_BIN/clang"
            exit 13
          fi
          if [ ! -x "$PAHOLE_BIN" ]; then
            # PAHOLE 不强制要求在 prebuilt，可以从系统 PATH 兜底
            PAHOLE_BIN=$(command -v pahole || true)
            [ -z "$PAHOLE_BIN" ] && { echo "::error::pahole 缺失"; exit 13; }
            echo "⚠️ pahole 走系统 PATH: $PAHOLE_BIN"
          fi

          export PATH="$CLANG_BIN:/usr/lib/ccache:$PATH"
          echo "✅ PATH head: $CLANG_BIN"
          clang --version | head -1

          # ---- 路径重映射：让产物里不带 GitHub runner 绝对路径，提高 ccache 命中 ----
          cd ./common
          COMMON_REAL=$(pwd -P)
          PLATFORM_REAL=$(dirname "$COMMON_REAL")
          ROOT_REAL=$(dirname "$PLATFORM_REAL")
          KCFLAGS="-fdebug-prefix-map=$ROOT_REAL=. -fmacro-prefix-map=$ROOT_REAL=. -ffile-prefix-map=$ROOT_REAL=. -no-canonical-prefixes -Wno-error -D__ANDROID_COMMON_KERNEL__"

          MAKE_ARGS=(
            LLVM=1
            ARCH=arm64
            CROSS_COMPILE=aarch64-linux-gnu-
            CC="ccache clang"
            HOSTCC="ccache clang"
            HOSTLD=ld.lld
            LD=ld.lld
            PAHOLE="$PAHOLE_BIN"
            KCFLAGS="$KCFLAGS"
          )

          make O=out "${MAKE_ARGS[@]}" gki_defconfig --no-print-directory
          make O=out "${MAKE_ARGS[@]}" olddefconfig --no-print-directory
          make -j"$(nproc --all)" O=out "${MAKE_ARGS[@]}"

          # 产物存在性兜底校验
          IMG="$COMMON_REAL/out/arch/arm64/boot/Image"
          if [ ! -s "$IMG" ]; then
            echo "::error::内核编译失败：未生成 $IMG"
            exit 1
          fi
          echo "::notice::内核编译成功：$IMG ($(stat -c%s "$IMG") bytes)"

      - name: Make AnyKernel3
        run: |
          set -euo pipefail
          # 上一步 Clean workspace 已删过 AnyKernel3 兜底；这里再加 -rf 保证幂等
          rm -rf ./AnyKernel3
          # 锁 AnyKernel3 commit（默认锚定到 release 40069 验证 OK 的版本）
          AK3_PIN="${{ github.event.inputs.ANYKERNEL3_COMMIT }}"
          if [ -n "$AK3_PIN" ]; then
            git clone https://github.com/Numbersf/AnyKernel3
            (cd AnyKernel3 && git checkout "$AK3_PIN")
          else
            git clone https://github.com/Numbersf/AnyKernel3 --depth=1
          fi
          echo "AnyKernel3 HEAD: $(cd AnyKernel3 && git rev-parse --short HEAD)"
          rm -rf ./AnyKernel3/.git

          # FAST 路径下 Image 只会落在 common/out/arch/arm64/boot/Image。
          # 兜底用 find 在 common/out 下递归找一下，防止 OnePlus 版本 manifest
          # 把输出落到子目录的情况。
          IMG_FAST="kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image"
          if [ -f "$IMG_FAST" ]; then
            image_path="$IMG_FAST"
          else
            image_path=$(find "./kernel_workspace/kernel_platform/common/out/" -name "Image" -type f 2>/dev/null | head -n 1)
          fi

          if [ -n "$image_path" ] && [ -f "$image_path" ]; then
            cp "$image_path" ./AnyKernel3/Image
            echo "✅ 已复制 Image -> AnyKernel3/Image (来自: $image_path)"
          else
            echo "::error::未找到 Image 文件，构建失败"
            exit 1
          fi

      - name: Apply patch_linux and replace Image
        if: ${{ github.event.inputs.KPM == 'true' }}
        run: |
          # patch_linux 只需要 Image 这一个输入，输出 oImage。直接在 AnyKernel3/ 下跑，
          # 跑完用 oImage 覆盖 Image，避免和 self-hosted runner 路径强绑定。
          # 用本地已锁版本的 SukiSU_patch/kpm/patch_linux，不再 curl raw.githubusercontent
          # —— 后者会跟随 main HEAD 飘移，无法锁定。
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/AnyKernel3"
          PATCH_LINUX="$GITHUB_WORKSPACE/kernel_workspace/SukiSU_patch/kpm/patch_linux"
          if [ -x "$PATCH_LINUX" ] || [ -f "$PATCH_LINUX" ]; then
            cp "$PATCH_LINUX" patch_linux
          else
            echo "::warning::本地 SukiSU_patch 未找到 patch_linux，回退到在线获取（不受 commit 锁定）"
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU_patch/refs/heads/main/kpm/patch_linux" -o patch_linux
          fi
          chmod +x patch_linux
          ./patch_linux
          rm -f Image
          mv oImage Image

      # 下载 SUSFS 模块（CI）
      - name: Download Latest SUSFS Module from CI
        if: ${{ github.event.inputs.SUSFS_CI == 'true' }}
        run: |
          LATEST_RUN_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs?status=success" | \
            jq -r '.workflow_runs[] | select(.head_branch == "v1.5.2+") | .id' | head -n 1)

          if [ -z "$LATEST_RUN_ID" ]; then
            echo "No successful run found for branch v1.5.2+"
            exit 1
          fi

          ARTIFACT_URL=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/$LATEST_RUN_ID/artifacts" | jq -r '.artifacts[0].archive_download_url')

          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -o ksu_module_susfs.zip "$ARTIFACT_URL"
          cp ksu_module_susfs.zip ./AnyKernel3/

      # 下载 SUSFS 模块（Release）
      - name: Download Latest SUSFS Module from Release
        if: ${{ github.event.inputs.SUSFS_CI == 'false' }}
        run: |
          wget https://github.com/sidex15/ksu_module_susfs/releases/latest/download/ksu_module_susfs_1.5.2+.zip
          cp ksu_module_susfs_1.5.2+.zip ./AnyKernel3/

      - name: Set suffix
        id: suffix
        run: |
          echo "value=${{ github.event.inputs.KPM == 'true' && '_KPM' || '' }}${{ github.event.inputs.VFS == 'true' && '_VFS' || '' }}${{ github.event.inputs.ZRAM == 'true' && '_LZ4KD' || '' }}" >> $GITHUB_OUTPUT

      - name: Remove _uv suffix from FEIL
        id: feil_clean
        run: |
          clean_feil="${{ github.event.inputs.FEIL }}"
          clean_feil="${clean_feil%_v}"  # 去掉结尾的 _v（如果有）
          clean_feil="${clean_feil%_u}"  # 去掉结尾的 _u（如果有）
          echo "value=$clean_feil" >> $GITHUB_OUTPUT

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3_SukiSUUltra_${{ env.KSUVER }}_${{ steps.feil_clean.outputs.value }}${{ steps.suffix.outputs.value }}
          path: ./AnyKernel3/*
